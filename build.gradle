plugins {
    id 'base'
}

def pythonVenvDirName = "venv"
def pythonVenvDir = "$projectDir/$pythonVenvDirName"
def yamlExtension = ".yaml"
def jsonExtension = ".json"
def pythonExtension = ".py"
def markdownExtension = ".md"
def unifiedSchemaFileName = "unifiedSchema"
def unifiedSchemaSrcDirPath = "$projectDir/packages/computationalAnalysisSchema"
def unifiedSchemaBuildPath = "$buildDir/$unifiedSchemaFileName$yamlExtension"
def modelExamplesDirName = "model/examples"
def modelExamplesSrcDir = "$projectDir/$modelExamplesDirName"
def modelExamplesBuildDir = "$buildDir/$modelExamplesDirName"
def modelBuildDirName = "$modelExamplesDirName"
def modelBuildDir = "$buildDir/$modelBuildDirName"
def analyticalModelTemplateFileName = "run_analysis.py.njk"
def queryDirName = "views/queries"
def analyticalModelBuildDir = "$buildDir/$queryDirName"
def querySrcDir = "$projectDir/$queryDirName"
def resultsBuildDirName = "$queryDirName/results"
def resultsBuildDir = "$buildDir/$resultsBuildDirName"
def reportTemplateFileName = "analysis_report.md.njk"
def reportSrcDirName = "views/"
def reportTemplateDir = "$projectDir/$reportSrcDirName"
def reportTemplatePath = "$reportTemplateDir/$reportTemplateFileName"
def reportBuildDirName = "$queryDirName/reports"
def reportBuildDir = "$buildDir/$reportBuildDirName"

tasks.register('createPythonVenv') {
    inputs.files(fileTree("$projectDir"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$pythonVenvDir"))
    exec {
         commandLine "python", "-m", "venv", "$pythonVenvDirName"
    }
}

tasks.register('installPythonDependencies') {
    dependsOn(createPythonVenv)
    inputs.files(fileTree("$projectDir/requirements.txt"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$pythonVenvDir"))
    exec {
         commandLine "$projectDir/venv/bin/python", "$projectDir/venv/bin/pip", "install", "-r", "$projectDir/requirements.txt"
    }
}

tasks.register('loadUnifiedSchemaAsYaml', Exec) {
    inputs.files(fileTree("$unifiedSchemaSrcDirPath"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$buildDir"))
    commandLine "bash", "-c", "npm exec -- yds-load $unifiedSchemaSrcDirPath > $unifiedSchemaBuildPath"
}

tasks.register('buildUnifiedSchema', Exec) {
//    dependsOn(loadUnifiedSchema)
    dependsOn(loadUnifiedSchemaAsYaml)
    inputs.files(fileTree("$unifiedSchemaBuildPath"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$buildDir"))
    commandLine "bash", "-c", "gen-yaml $unifiedSchemaBuildPath --mergeimports"
}

tasks.register('cleanupUnifiedSchema', Exec) {
    dependsOn(buildUnifiedSchema)
    inputs.files(fileTree("$unifiedSchemaBuildPath"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$buildDir"))
    commandLine "yq", "-i", "del(.imports)", "$unifiedSchemaBuildPath"
}

tasks.register('queryModelExamples') {
    dependsOn(cleanupUnifiedSchema)
    inputs.files(fileTree("$modelExamplesSrcDir"))
    .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$modelExamplesBuildDir"))
    doLast {
        new File("$modelExamplesSrcDir").eachDir { dir ->
            exec {
                commandLine "bash", "-c", "npm exec -- yds-load $modelExamplesSrcDir/$dir.name > $modelExamplesBuildDir/$dir.name$yamlExtension"
            }
        }
    }
}

tasks.register('validateModelExamples') {
    dependsOn(queryModelExamples)
    inputs.files(fileTree("$modelExamplesBuildDir"))
    .withPathSensitivity(PathSensitivity.ABSOLUTE)
    doLast {
        fileTree("$modelExamplesBuildDir").matching {
            include "*$yamlExtension"
        }.each { file ->
            exec {
                //commandLine "echo", "$unifiedSchemaBuildPath"
                commandLine "linkml-validate", "-s", "$unifiedSchemaBuildPath", "$modelExamplesBuildDir/$file.name"
            }
        }
    }
}

tasks.register('buildAnalyticalModelExamples') {
    dependsOn(validateModelExamples)
    inputs.files(fileTree("$modelExamplesBuildDir"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$resultsBuildDir"))
    doLast {
        new File("$modelExamplesSrcDir").eachDir { dir ->
            exec {
                commandLine "bash", "-c", "npm exec -- nunjucks -d $modelExamplesBuildDir/$dir.name$yamlExtension $querySrcDir/$analyticalModelTemplateFileName > $analyticalModelBuildDir/$dir.name$pythonExtension"
            }
        }
    }
}

tasks.register('generateAnalysisResults') {
    dependsOn(buildAnalyticalModelExamples)
    inputs.files(fileTree("$resultsBuildDir"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$resultsBuildDir"))
    doLast {
        new File("$modelExamplesSrcDir").eachDir { dir ->
            exec {
                commandLine "bash", "-c", "./venv/bin/python $analyticalModelBuildDir/$dir.name$pythonExtension > $resultsBuildDir/$dir.name$jsonExtension"
            }
        }
    }
}

tasks.register('generateReport') {
    dependsOn(generateAnalysisResults)
    inputs.files(fileTree("$resultsBuildDir"))
        .withPathSensitivity(PathSensitivity.ABSOLUTE)
    outputs.dir(layout.buildDirectory.dir("$reportBuildDir"))
    doLast {
        fileTree("$resultsBuildDir").matching {
            include "*$jsonExtension"
        }.each { file ->
            exec {
                commandLine "bash", "-c", "npm exec -- nunjucks -d $file $reportTemplatePath > $reportBuildDir/$file.name$markdownExtension && cat $reportBuildDir/$file.name$markdownExtension"
            }
        }
    }
}

tasks.named("assemble") {
    dependsOn(generateReport)
}

